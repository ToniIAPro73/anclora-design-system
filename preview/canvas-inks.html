<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:20px;font-family:var(--font-sans);color:var(--fg1);background:linear-gradient(180deg,#0f1520,#151c28)}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.cell{padding:14px;border-radius:14px;border:1px solid rgba(255,255,255,0.1);display:flex;flex-direction:column;justify-content:flex-end}
.name{font-family:var(--font-mono);font-size:0.62rem;color:#fff;opacity:0.75;margin-top:6px}
.hex{font-family:var(--font-mono);font-size:0.58rem;color:#fff;opacity:0.55}
</style></head><body>
<div class="grid">
  <div class="cell" style="background:#0f1520;min-height:80px"><div class="name">--group-ink</div><div class="hex">#0F1520</div></div>
  <div class="cell" style="background:#151c28;min-height:80px"><div class="name">--group-slate</div><div class="hex">#151C28</div></div>
  <div class="cell" style="background:#1a2230;min-height:80px"><div class="name">--group-surface</div><div class="hex">#1A2230</div></div>
  <div class="cell" style="background:#202a38;min-height:80px"><div class="name">--group-surface-2</div><div class="hex">#202A38</div></div>
  <div class="cell" style="background:#0d1b1a;min-height:80px"><div class="name">--pe-deep-bg</div><div class="hex">#0D1B1A</div></div>
  <div class="cell" style="background:#071411;min-height:80px"><div class="name">--dl-bg</div><div class="hex">#071411</div></div>
</div>
</body></html>
