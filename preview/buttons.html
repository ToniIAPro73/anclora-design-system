<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:20px;font-family:var(--font-sans);background:linear-gradient(180deg,#0f1520,#151c28);color:var(--fg1)}
.stack{display:grid;gap:14px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:0 20px;border-radius:999px;font-size:0.76rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;cursor:pointer;border:1px solid}
.primary{background:linear-gradient(145deg,#dfe4ea,#b9c1cb 18%,#f6f8fa 44%,#929dab 72%,#eef2f5);color:#0f1720;border-color:rgba(255,255,255,0.2);box-shadow:0 14px 28px rgba(174,182,194,0.18)}
.gold{background:linear-gradient(135deg,#bf953f,#fcf6ba 45%,#b38728 50%,#fbf5b7 55%,#aa771c);color:#08212a;border-color:rgba(212,175,55,0.55);box-shadow:0 14px 28px rgba(212,175,55,0.2)}
.amethyst{background:linear-gradient(135deg,#8c5ab4,#f3e7fb 44%,#c07860 52%,#f5ece6 57%,#6d3f90);color:#160f20;border-color:rgba(140,90,180,0.55);box-shadow:0 14px 28px rgba(140,90,180,0.22)}
.ghost{background:rgba(255,255,255,0.04);color:#ecf0f5;border-color:rgba(255,255,255,0.16)}
.emerald{background:linear-gradient(90deg,rgba(45,160,120,0.94),rgba(192,120,96,0.86));color:#08110d;border-color:rgba(192,120,96,0.42);box-shadow:0 14px 28px rgba(45,160,120,0.24)}
.nx{background:#D4AF37;color:#0F1629;border-color:rgba(212,175,55,0.55)}
.label{font-size:0.6rem;letter-spacing:0.18em;text-transform:uppercase;color:rgba(236,240,245,0.62);margin-top:4px}
</style></head><body>
<div class="stack">
<div>
  <div class="row"><button class="btn primary">Abrir aplicación</button><button class="btn ghost">Cerrar sesión</button></div>
  <div class="label">Group — silver primary + ghost</div>
</div>
<div>
  <div class="row"><button class="btn gold">Solicitar acceso</button><button class="btn amethyst">Enviar solicitud</button><button class="btn emerald">Publicar pack</button><button class="btn nx">Crear</button></div>
  <div class="label">Per-product primaries: PE · Synergi · Data Lab · Nexus</div>
</div>
</div>
</body></html>
