<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../src/system.css" />
    <style>
      html,
      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(180deg, #0f1520, #151c28);
      }

      .wrap {
        padding: 24px;
        display: grid;
        gap: 18px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }

      .sample {
        padding: var(--panel-padding);
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      @media (max-width: 900px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap shell-frame">
      <div class="eyebrow">Button foundations by tier</div>
      <div class="grid">
        <section class="product-anclora-nexus tier-internal surface-panel sample stack">
          <div class="eyebrow">Internal</div>
          <h2 class="h3">Semántica estable, menor ceremonialidad.</h2>
          <div class="row">
            <button class="btn btn-primary">Crear registro</button>
            <button class="btn btn-secondary">Guardar borrador</button>
            <button class="btn btn-ghost">Cancelar</button>
          </div>
        </section>

        <section class="product-anclora-portfolio tier-portfolio surface-panel sample stack">
          <div class="eyebrow">Portfolio</div>
          <h2 class="h3">Conversión visible desde el primer bloque.</h2>
          <div class="row">
            <button class="btn btn-primary">Ver propiedades</button>
            <button class="btn btn-secondary">Solicitar dossier</button>
            <button class="btn btn-ghost">Explorar caso</button>
          </div>
        </section>

        <section class="product-anclora-synergi tier-premium surface-panel sample stack">
          <div class="eyebrow">Premium</div>
          <h2 class="h3">Mayor presencia visual, misma disciplina de CTA.</h2>
          <div class="row">
            <button class="btn btn-primary">Enviar solicitud</button>
            <button class="btn btn-secondary">Ver criterios</button>
            <button class="btn btn-ghost">Cerrar</button>
          </div>
        </section>

        <section class="product-anclora-private-estates tier-ultra-premium surface-panel sample brand-glow stack">
          <div class="eyebrow">Ultra premium</div>
          <h2 class="h3">Firma visual más rica sin perder precisión.</h2>
          <div class="row">
            <button class="btn btn-primary btn-sweep">Solicitar acceso</button>
            <button class="btn btn-secondary">Descargar dossier</button>
            <button class="btn btn-ghost">Ver propiedades</button>
          </div>
        </section>
      </div>
    </div>
  </body>
</html>
