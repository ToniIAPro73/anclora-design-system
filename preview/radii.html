<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:22px;font-family:var(--font-sans);background:linear-gradient(180deg,#0f1520,#151c28);color:var(--fg1)}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;text-align:center}
.cell{display:flex;flex-direction:column;align-items:center;gap:8px;padding:10px;border-radius:14px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05)}
.name{font-family:var(--font-mono);font-size:0.6rem;color:rgba(236,240,245,0.6)}
.val{font-family:var(--font-mono);font-size:0.62rem;color:#a8aeb8}
.box{background:linear-gradient(145deg,#b9c1cb,#eef2f5);border:1px solid rgba(0,0,0,0.2)}
</style></head><body>
<div class="grid">
  <div class="cell"><div class="box" style="width:48px;height:48px;border-radius:12px"></div><div class="name">sm</div><div class="val">12px</div></div>
  <div class="cell"><div class="box" style="width:48px;height:48px;border-radius:18px"></div><div class="name">md</div><div class="val">18px</div></div>
  <div class="cell"><div class="box" style="width:48px;height:48px;border-radius:24px"></div><div class="name">lg</div><div class="val">24px</div></div>
  <div class="cell"><div class="box" style="width:48px;height:48px;border-radius:32px"></div><div class="name">xl</div><div class="val">32px</div></div>
  <div class="cell"><div class="box" style="width:48px;height:48px;border-radius:34px"></div><div class="name">2xl</div><div class="val">34px</div></div>
  <div class="cell"><div class="box" style="width:48px;height:48px;border-radius:999px"></div><div class="name">pill</div><div class="val">999px</div></div>
</div>
</body></html>
