<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:22px;font-family:var(--font-sans);background:linear-gradient(180deg,#0f1520,#151c28);color:var(--fg1)}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.badge{display:inline-flex;align-items:center;min-height:28px;padding:0 12px;border-radius:999px;font-size:0.66rem;font-weight:800;letter-spacing:0.16em;text-transform:uppercase}
.s{background:rgba(212,175,55,0.16);color:#d8bf86}
.r{background:rgba(144,206,214,0.16);color:#8fc3c7}
.a{background:rgba(82,190,128,0.18);color:#a9efb7}
.rj{background:rgba(225,87,89,0.18);color:#ffb8b9}
.tag{display:inline-flex;align-items:center;min-height:34px;padding:0 16px;border-radius:999px;border:1px solid rgba(168,174,184,0.25);background:rgba(255,255,255,0.04);font-size:0.72rem;letter-spacing:0.2em;text-transform:uppercase;color:#ecf0f5;font-weight:700}
.label{font-size:0.6rem;letter-spacing:0.22em;text-transform:uppercase;color:rgba(236,240,245,0.55);margin:6px 0}
</style></head><body>
<div class="label">Status badges</div>
<div class="row">
  <span class="badge s">Submitted</span>
  <span class="badge r">Under review</span>
  <span class="badge a">Accepted</span>
  <span class="badge rj">Rejected</span>
</div>
<div class="label" style="margin-top:12px">Pill tags / eyebrows</div>
<div class="row">
  <span class="tag">Portal corporativo</span>
  <span class="tag">Internal</span>
  <span class="tag">External</span>
</div>
</body></html>
