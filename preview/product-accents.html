<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;background:linear-gradient(180deg,#0d1b1a 0%,#0b1520 100%);color:var(--fg1);font-family:var(--font-sans);padding:18px}
.row{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.swatch{aspect-ratio:1.3;border-radius:14px;border:1px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;justify-content:flex-end;padding:8px;font-size:0.6rem;color:#fff}
.name{font-weight:700;letter-spacing:0.1em;text-transform:uppercase;font-size:0.55rem}
.hex{font-family:var(--font-mono);opacity:0.8;font-size:0.55rem;margin-top:2px}
.section-title{font-size:0.62rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--fg3);margin:6px 0 8px;font-weight:700}
</style></head><body>
<div class="section-title">Product accent coins — metallic signatures</div>
<div class="row">
  <div class="swatch" style="background:#a8aeb8"><div class="name" style="color:#0f1520">Group</div><div class="hex" style="color:#0f1520">#A8AEB8</div></div>
  <div class="swatch" style="background:#c9a95f"><div class="name" style="color:#1a1200">Private Est.</div><div class="hex" style="color:#1a1200">#C9A95F</div></div>
  <div class="swatch" style="background:#8c5ab4"><div class="name">Synergi</div><div class="hex">#8C5AB4</div></div>
  <div class="swatch" style="background:#2da078"><div class="name">Data Lab</div><div class="hex">#2DA078</div></div>
  <div class="swatch" style="background:#d4af37"><div class="name" style="color:#1a1200">Nexus</div><div class="hex" style="color:#1a1200">#D4AF37</div></div>
  <div class="swatch" style="background:#c07860"><div class="name">Content</div><div class="hex">#C07860</div></div>
  <div class="swatch" style="background:#7ec6c0"><div class="name" style="color:#07211f">Advisor</div><div class="hex" style="color:#07211f">#7EC6C0</div></div>
  <div class="swatch" style="background:#6ca8e0"><div class="name" style="color:#07141f">Talent</div><div class="hex" style="color:#07141f">#6CA8E0</div></div>
  <div class="swatch" style="background:#e07a3c"><div class="name">Impulso</div><div class="hex">#E07A3C</div></div>
  <div class="swatch" style="background:#c24a4a"><div class="name">Command</div><div class="hex">#C24A4A</div></div>
</div>
</body></html>
