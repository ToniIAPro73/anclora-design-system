<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../src/system.css"><style>
html,body{margin:0;padding:0;background:linear-gradient(180deg,#0f1520 0%,#151c28 100%);color:#f5f7fa;font-family:var(--font-sans);min-height:100vh}
.wrap{padding:20px 22px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;align-content:center;min-height:100vh;box-sizing:border-box}
.card{padding:18px 20px;border:1px solid rgba(168,174,184,0.28);border-radius:22px;background:linear-gradient(180deg,rgba(26,34,48,0.96),rgba(15,21,32,0.96));box-shadow:0 18px 38px rgba(0,0,0,0.38),inset 0 1px 0 rgba(255,255,255,0.06);display:flex;flex-direction:column;gap:10px}
.card.hover{transform:translateY(-4px);border-color:rgba(168,174,184,0.55);box-shadow:0 28px 70px rgba(0,0,0,0.45),0 0 0 1px rgba(168,174,184,0.14),inset 0 1px 0 rgba(255,255,255,0.08)}
.eyebrow{font-size:0.66rem;letter-spacing:0.22em;text-transform:uppercase;color:#d8bf86;font-weight:800}
.title{font-family:var(--font-display);font-size:1.15rem;margin:0;font-weight:600;color:#ffffff;letter-spacing:-0.01em}
.meta{color:rgba(245,247,250,0.82);font-size:0.82rem;line-height:1.55;font-weight:400}
.pill{border-radius:999px;padding:12px 18px;min-height:44px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(201,169,95,0.45);background:rgba(201,169,95,0.1);box-shadow:inset 0 1px 0 rgba(255,255,255,0.06)}
.pill span{font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;font-weight:800;color:#eddba0}
</style></head><body>
<div class="wrap">
  <div class="card">
    <div class="eyebrow">Card · Resting</div>
    <div class="title">Admission request</div>
    <div class="meta">1px border, 22px radius, heavy downward shadow, inset top highlight.</div>
  </div>
  <div class="card hover">
    <div class="eyebrow">Card · Hover</div>
    <div class="title">Admission request</div>
    <div class="meta">Lifts 4px, border brightens, tinted glow ring appears.</div>
  </div>
  <div style="display:flex;align-items:center;justify-content:center"><div class="pill"><span>Pill · Chip</span></div></div>
</div>
</body></html>
