<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:22px;font-family:var(--font-sans);background:linear-gradient(180deg,#0f1520,#151c28);color:var(--fg1)}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.cell{background:rgba(255,255,255,0.03);border-radius:18px;padding:18px;display:flex;flex-direction:column;align-items:center;gap:12px}
.box{width:64px;height:64px;border-radius:16px;background:linear-gradient(180deg,#1a2230,#0f1520);border:1px solid rgba(168,174,184,0.25)}
.name{font-family:var(--font-mono);font-size:0.62rem;color:rgba(236,240,245,0.65)}
.xs{box-shadow:0 6px 14px rgba(2,6,12,0.22)}
.sm{box-shadow:0 14px 34px rgba(0,0,0,0.3)}
.md{box-shadow:0 18px 38px rgba(0,0,0,0.34)}
.lg{box-shadow:0 28px 70px rgba(0,0,0,0.4)}
</style></head><body>
<div class="grid">
  <div class="cell"><div class="box xs"></div><div class="name">shadow-xs · resting chips</div></div>
  <div class="cell"><div class="box sm"></div><div class="name">shadow-sm · cards</div></div>
  <div class="cell"><div class="box md"></div><div class="name">shadow-md · buttons / kpi</div></div>
  <div class="cell"><div class="box lg"></div><div class="name">shadow-lg · top-level panels</div></div>
</div>
</body></html>
