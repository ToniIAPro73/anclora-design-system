<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../src/system.css"><style>
html,body{margin:0;padding:0;background:linear-gradient(180deg,#0f1520 0%,#151c28 100%);font-family:var(--font-sans);min-height:100vh}
.wrap{padding:18px 20px;display:grid;grid-template-columns:repeat(5,1fr);gap:12px 14px;align-content:center;min-height:100vh;box-sizing:border-box}
.cell{display:flex;flex-direction:column;align-items:center;gap:6px}
.coin{width:100%;aspect-ratio:1;border-radius:18px;background:radial-gradient(70% 70% at 50% 30%,rgba(255,255,255,0.04),rgba(0,0,0,0.25));border:1px solid rgba(168,174,184,0.2);display:flex;align-items:center;justify-content:center;padding:10px;box-sizing:border-box;box-shadow:0 10px 24px rgba(0,0,0,0.35)}
.coin img{width:100%;height:100%;object-fit:contain;display:block}
.label{font-size:0.56rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(236,240,245,0.72);text-align:center;font-weight:700}
</style></head><body>
<div class="wrap">
  <div class="cell"><div class="coin"><img src="../assets/logos/anclora-group.png" alt=""></div><div class="label">Group</div></div>
  <div class="cell"><div class="coin"><img src="../assets/logos/anclora-private-estates.png" alt=""></div><div class="label">Private Est.</div></div>
  <div class="cell"><div class="coin"><img src="../assets/logos/anclora-nexus.png" alt=""></div><div class="label">Nexus</div></div>
  <div class="cell"><div class="coin"><img src="../assets/logos/anclora-synergi.png" alt=""></div><div class="label">Synergi</div></div>
  <div class="cell"><div class="coin"><img src="../assets/logos/anclora-data-lab.png" alt=""></div><div class="label">Data Lab</div></div>
  <div class="cell"><div class="coin"><img src="../assets/logos/anclora-content-generator-ai.png" alt=""></div><div class="label">Content Gen</div></div>
  <div class="cell"><div class="coin"><img src="../assets/logos/anclora-advisor-ai.png" alt=""></div><div class="label">Advisor AI</div></div>
  <div class="cell"><div class="coin"><img src="../assets/logos/anclora-talent.png" alt=""></div><div class="label">Talent</div></div>
  <div class="cell"><div class="coin"><img src="../assets/logos/anclora-impulso.png" alt=""></div><div class="label">Impulso</div></div>
  <div class="cell"><div class="coin"><img src="../assets/logos/anclora-command-center.png" alt=""></div><div class="label">Command</div></div>
</div>
</body></html>
